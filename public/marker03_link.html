<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<title>Cesium Marker Example</title>
	<script src="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Cesium.js"></script>
	<link href="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Widgets/widgets.css"
		rel="stylesheet" />
	<style>
		html,
		body,
		#cesiumContainer {
			width: 100%;
			height: 100%;
			margin: 0;
			padding: 0;
			overflow: hidden;
		}

		.marker-info {
			position: absolute;
			top: 16px;
			left: 16px;
			z-index: 10;
			min-width: 240px;
			padding: 12px 14px;
			border-radius: 8px;
			background: rgba(20, 20, 20, 0.85);
			color: #fff;
			font: 14px/1.5 Arial, sans-serif;
		}

		.marker-info strong {
			display: block;
			margin-bottom: 6px;
			font-size: 15px;
		}
	</style>
</head>

<body>
	<div id="cesiumContainer"></div>
	<div id="markerInfo" class="marker-info">마커를 클릭하세요.</div>

	<script>
		Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkODk4ZDliNS03NGQ4LTRiYmUtOTg1NS1iOTE1MmRmYTg0NmQiLCJpZCI6MzI4MzY5LCJpYXQiOjE3NTQyNzk4MjF9.o2SCIP-TECRFhK9xKGkFGEKfaCxRrOk143V_9k4ZXQA';

		const viewer = new Cesium.Viewer("cesiumContainer", {
			animation: false,
			timeline: false,
			selectionIndicator: true,
			infoBox: false
		});

		// 시작 카메라
		viewer.camera.flyTo({
			destination: Cesium.Cartesian3.fromDegrees(127.5, 37.0, 800000),
			orientation: {
				heading: 0,
				pitch: Cesium.Math.toRadians(-90),
				roll: 0.0
			}
		});

		// 상태 라벨
		const STATUS_LABEL = {
			done: "구축완료",
			ready: "구축준비",
			unknown: "미정"
		};

		// 상태별 스타일
		const STATUS_STYLE = {
			done: {
				pointColor: null, // 개별 color 사용
				pointSize: 20,
				outlineWidth: 4,
				labelShow: true,
				labelFont: "bold 24px 'Noto Sans KR'"
			},
			ready: {
				pointColor: Cesium.Color.fromBytes(150, 150, 150),
				pointSize: 14,
				outlineWidth: 2,
				labelShow: false,
				labelFont: "bold 24px 'Noto Sans KR'"
			},
			unknown: {
				pointColor: Cesium.Color.fromBytes(110, 110, 110),
				pointSize: 10,
				outlineWidth: 2,
				labelShow: false,
				labelFont: "bold 24px 'Noto Sans KR'"
			}
		};

		// 마커 데이터
		const markerData = [
			{
				id: "marker-01",
				name: "평택발전본부",
				lon: 126.8356,
				lat: 36.9754,
				height: 0,
				markerClass: "complex-division",
				category: "Complex Division",
				color: Cesium.Color.fromBytes(20, 140, 234),
				labelText: "평택발전본부",
				status: "done",
				url: "/detail/pt"
			},
			{
				id: "marker-02",
				name: "태안발전본부",
				lon: 126.2509,
				lat: 36.9406,
				height: 0,
				markerClass: "complex-division",
				category: "Complex Division",
				color: Cesium.Color.fromBytes(8, 64, 112),
				labelText: "태안발전본부",
				status: "done",
				url: "/detail/ta"
			},
			{
				id: "marker-03",
				name: "김포발전본부",
				lon: 126.6506,
				lat: 37.6485,
				height: 0,
				markerClass: "heat-division",
				category: "Heat & Power Division",
				color: Cesium.Color.fromBytes(156, 40, 176),
				labelText: "김포발전본부",
				status: "ready",
				url: "/detail/gp"
			},
			{
				id: "marker-04",
				name: "서인천발전본부",
				lon: 126.6233,
				lat: 37.5458,
				height: 0,
				markerClass: "combined-division",
				category: "Combined Division",
				color: Cesium.Color.fromBytes(80, 80, 80),
				labelText: "서인천발전본부",
				status: "unknown",
				url: "/detail/ic"
			},
			{
				id: "marker-05",
				name: "군산발전본부",
				lon: 126.7312,
				lat: 35.9819,
				height: 0,
				markerClass: "complex-division",
				category: "Complex Division",
				color: Cesium.Color.fromBytes(80, 80, 80),
				labelText: "군산발전본부",
				status: "ready",
				url: "/detail/gs"
			}
		];

		function getStatusStyle(status) {
			return STATUS_STYLE[status] || STATUS_STYLE.unknown;
		}

		function getPointColor(item) {
			const style = getStatusStyle(item.status);
			return style.pointColor || item.color;
		}

		function addMarker(item) {
			const style = getStatusStyle(item.status);

			return viewer.entities.add({
				id: item.id,
				name: item.name,
				position: Cesium.Cartesian3.fromDegrees(item.lon, item.lat, item.height),

				properties: new Cesium.PropertyBag({
					markerClass: item.markerClass,
					category: item.category,
					lon: item.lon,
					lat: item.lat,
					status: item.status,
					url: item.url || ""
				}),

				point: {
					pixelSize: style.pointSize,
					color: getPointColor(item),
					outlineColor: Cesium.Color.WHITE,
					outlineWidth: style.outlineWidth,
					disableDepthTestDistance: Number.POSITIVE_INFINITY
				},

				label: {
					text: item.labelText,
					font: style.labelFont,
					fillColor: Cesium.Color.WHITE,
					outlineColor: Cesium.Color.BLACK,
					outlineWidth: 3,
					style: Cesium.LabelStyle.FILL_AND_OUTLINE,
					showBackground: true,
					backgroundColor: Cesium.Color.fromBytes(0, 0, 0, 160),
					horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
					verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
					pixelOffset: new Cesium.Cartesian2(0, -18),
					disableDepthTestDistance: Number.POSITIVE_INFINITY,
					scaleByDistance: new Cesium.NearFarScalar(500, 1.0, 10000, 0.8),
					translucencyByDistance: new Cesium.NearFarScalar(500, 1.0, 30000, 0.6),
					show: style.labelShow
				}
			});
		}

		const entities = markerData.map(addMarker);

		// 클러스터링
		viewer.entities.cluster.enabled = false;
		viewer.entities.cluster.pixelRange = 40;
		viewer.entities.cluster.minimumClusterSize = 2;

		viewer.entities.cluster.clusterEvent.addEventListener(function (clusteredEntities, cluster) {
			cluster.label.show = true;
			cluster.label.text = clusteredEntities.length.toString();
			cluster.label.font = "bold 16px Arial";
			cluster.label.fillColor = Cesium.Color.WHITE;
			cluster.label.outlineColor = Cesium.Color.BLACK;
			cluster.label.outlineWidth = 3;
			cluster.label.style = Cesium.LabelStyle.FILL_AND_OUTLINE;
			cluster.label.showBackground = true;
			cluster.label.backgroundColor = Cesium.Color.fromBytes(30, 70, 140, 220);
			cluster.label.disableDepthTestDistance = Number.POSITIVE_INFINITY;

			cluster.billboard.show = false;
			cluster.point.show = true;
			cluster.point.pixelSize = 28;
			cluster.point.color = Cesium.Color.fromBytes(30, 70, 140, 200);
			cluster.point.outlineColor = Cesium.Color.WHITE;
			cluster.point.outlineWidth = 3;
			cluster.point.disableDepthTestDistance = Number.POSITIVE_INFINITY;
		});

		const infoEl = document.getElementById("markerInfo");
		const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

		function getPickedEntity(position) {
			const picked = viewer.scene.pick(position);

			if (!Cesium.defined(picked)) return null;

			if (picked.id && picked.id instanceof Cesium.Entity) {
				return picked.id;
			}

			if (picked.primitive && picked.primitive.id instanceof Cesium.Entity) {
				return picked.primitive.id;
			}

			return null;
		}

		let hoveredEntity = null;

		function resetMarkerStyle(entity) {
			if (!entity || !entity.label || !entity.properties) return;

			const now = Cesium.JulianDate.now();
			const status = entity.properties.status?.getValue(now);
			const style = getStatusStyle(status);

			entity.label.show = style.labelShow;
			entity.label.font = style.labelFont;
		}

		function applyHoverStyle(entity) {
			if (!entity || !entity.label || !entity.properties) return;

			const now = Cesium.JulianDate.now();
			const status = entity.properties.status?.getValue(now);

			if (status === "done") {
				entity.label.show = true;
				entity.label.font = "bold 32px 'Noto Sans KR'";
			} else {
				entity.label.show = true;
				entity.label.font = "bold 24px 'Noto Sans KR'";
			}
		}

		handler.setInputAction(function (movement) {
			const entity = getPickedEntity(movement.endPosition);

			if (hoveredEntity && hoveredEntity !== entity) {
				resetMarkerStyle(hoveredEntity);
				hoveredEntity = null;
			}

			if (entity && hoveredEntity !== entity) {
				hoveredEntity = entity;
				applyHoverStyle(entity);
			}
		}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

		handler.setInputAction(function (click) {
			const entity = getPickedEntity(click.position);

			if (!entity) {
				infoEl.innerHTML = "마커를 클릭하세요.";
				return;
			}

			const props = entity.properties;
			const now = Cesium.JulianDate.now();

			const markerClass = props?.markerClass?.getValue(now) ?? "-";
			const category = props?.category?.getValue(now) ?? "-";
			const lon = props?.lon?.getValue(now) ?? "-";
			const lat = props?.lat?.getValue(now) ?? "-";
			const status = props?.status?.getValue(now) ?? "-";
			const url = props?.url?.getValue(now) ?? "";

			infoEl.innerHTML = `
		<strong>${entity.name}</strong>
		id: ${entity.id}<br>
		class: ${markerClass}<br>
		category: ${category}<br>
		status: ${STATUS_LABEL[status] || status}<br>
		lon: ${lon}<br>
		lat: ${lat}
	`;

			if (url) {
				window.location.href = url;
			}
		}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

		// 특정 markerClass show/hide
		function setVisibleByMarkerClass(targetClass, visible) {
			viewer.entities.values.forEach((entity) => {
				const cls = entity.properties?.markerClass?.getValue(Cesium.JulianDate.now());
				if (cls === targetClass) {
					entity.show = visible;
				}
			});
		}

		// 특정 category 색상 변경
		function updatePointColorByCategory(category, color) {
			viewer.entities.values.forEach((entity) => {
				const currentCategory = entity.properties?.category?.getValue(Cesium.JulianDate.now());
				if (currentCategory === category && entity.point) {
					entity.point.color = color;
				}
			});
		}
	</script>
</body>

</html>
